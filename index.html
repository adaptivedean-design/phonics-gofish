      .gf-turn-panel, .gf-score-panel, .gf-action-button, .gf-play-card, .gf-draw-pile, .gf-modal-panel, .gf-slide-panel, .gf-opponent-card {

      .gf-opponent-card { transition: transform 300ms cubic-bezier(.2, .8, .2, 1), filter 220ms ease; animation: gf-fan-in 360ms cubic-bezier(.2, .8, .2, 1) both; }

      .gf-scroll-cue { animation: gf-scroll-pulse 1.6s ease-in-out infinite; }
      @keyframes gf-card-enter { from { opacity: 0; transform: translateY(18px) scale(.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
      @keyframes gf-fan-in { from { opacity: 0; filter: blur(2px); } to { opacity: 1; filter: blur(0); } }
      @keyframes gf-selected-in { from { opacity: 0; transform: translateY(16px) scale(.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
      @keyframes gf-fade-in { from { opacity: 0; } to { opacity: 1; } }
      @keyframes gf-modal-in { from { opacity: 0; transform: translateY(18px) scale(.985); } to { opacity: 1; transform: translateY(0) scale(1); } }
      @keyframes gf-soft-pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, .38), 0 14px 30px rgba(0, 72, 112, .12); } 50% { box-shadow: 0 0 0 10px rgba(251, 191, 36, 0), 0 18px 36px rgba(0, 72, 112, .16); } }

          'digraph-th-voiceless-bath': 'https://i.ibb.co/hRZScJFk/digraph-th-unvoiced-bath.png',
          'digraph-th-voiceless-path': 'https://i.ibb.co/QvqzcXsz/digraph-th-unvoiced-path.png',
          'digraph-th-voiceless-thanks': 'https://i.ibb.co/HD0NnVXk/digraph-th-unvoiced-thanks.png',
          'digraph-th-voiceless-think': 'https://i.ibb.co/J6dHdf4/digraph-th-unvoiced-think.png',
          'digraph-ph-phone': 'https://i.ibb.co/Y7bbQnxF/digraph-ph-phone.png',
          'digraph-ph-photo': 'https://i.ibb.co/39bYJYH6/digraph-ph-photo.png',
          'digraph-ph-elephant': 'https://i.ibb.co/n8ZcVwtS/digraph-ph-elephant.png',
          'digraph-ph-alphabet': 'https://i.ibb.co/6RjVwkvt/digraph-ph-alphabet.png',
          'consonant-y-canyon': 'https://i.ibb.co/YFrfNWzJ/consonant-y-canyon.png',
          'consonant-y-yard': 'https://i.ibb.co/Qjpp3ST7/consonant-y-yard.png',
          'consonant-y-yogurt': 'https://i.ibb.co/60MCgXMH/consonant-y-yogurt.png',
          'consonant-y-yoyo': 'https://i.ibb.co/whJq15gy/consonant-y-yoyo.png'
        };

        const SET_NAMES = {
          'short-a': 'Short a', 'short-e': 'Short e', 'short-i': 'Short i',
          'short-o': 'Short o', 'short-u': 'Short u', 'digraph-ch': 'digraph ch',
          'digraph-sh': 'digraph sh', 'digraph-th-voiced': 'digraph th voiced',
          'digraph-th-voiceless': 'digraph th voiceless', 'digraph-ph': 'digraph ph',
          'consonant-y': 'consonant y'
        };

        const ArrowUp = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>;
        const Users = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const Settings = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6m9-9h-6m-6 0H3"/></svg>;
        const Copy = ({size=16}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>;
        const Check = ({size=16}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="20 6 9 17 4 12"/></svg>;
        const Wifi = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>;
        const WifiOff = ({size=16}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/></svg>;

        const GoFishPhonics = () => {
          // Sound effects from Mixkit - create refs to hold Audio objects
          const cardReceivedSound = useRef(null);
          const setCompletedSound = useRef(null);
          
          const [gameState, setGameState] = useState('setup');
          const [roomCode, setRoomCode] = useState('');
          const [playerName, setPlayerName] = useState('');
          const [opponentName, setOpponentName] = useState('');
          const [settings, setSettings] = useState({
            endTurnMode: 'always-draw',
            selectedSets: Object.keys(CARD_SETS),
            firstPlayer: 'host'
          });
          const [copied, setCopied] = useState(false);
          const [connected, setConnected] = useState(false);
          const [isHost, setIsHost] = useState(false);
          const [deck, setDeck] = useState([]);
          const [myHand, setMyHand] = useState([]);
          const [opponentHandCount, setOpponentHandCount] = useState(0);
          const [mySets, setMySets] = useState([]);
          const [opponentSets, setOpponentSets] = useState([]);
          const [isMyTurn, setIsMyTurn] = useState(false);
          const [selectedCard, setSelectedCard] = useState(null);
          const [draggedCard, setDraggedCard] = useState(null);
          const [dragOverIndex, setDragOverIndex] = useState(null);
          const [myScore, setMyScore] = useState(0);
          const [opponentScore, setOpponentScore] = useState(0);
          const [deckCount, setDeckCount] = useState(0);
          const [gameEnded, setGameEnded] = useState(false);
          const [winner, setWinner] = useState(null);
          const [showAllCards, setShowAllCards] = useState(false);
          const [showSets, setShowSets] = useState(false);
          const [showScrollTop, setShowScrollTop] = useState(false);
          const [showScrollBottom, setShowScrollBottom] = useState(false);
          const allCardsContainerRef = useRef(null);
          const [disconnectMessage, setDisconnectMessage] = useState('');
          const [tossingCard, setTossingCard] = useState(null);
          const [myPlayerId, setMyPlayerId] = useState('');
          const [completingSet, setCompletingSet] = useState(null); // {setKey, cards: [card objects]}
          const [showSetOverlay, setShowSetOverlay] = useState(false);
          const [incomingCard, setIncomingCard] = useState(null); // card object
          const [showIncomingOverlay, setShowIncomingOverlay] = useState(false);
          
          const roomRef = useRef(null);
          const gameDataRef = useRef(null);
          const presenceRef = useRef(null);
          const lastHandledPassedCardRef = useRef(null);
          const soundEffectsUnlockedRef = useRef(false);
          const INCOMING_ANIMATION_MS = 1500;

          const playSoundEffect = (soundRef) => {
            if (!soundRef.current) return;

            soundRef.current.currentTime = 0;
            soundRef.current.volume = 1;
            soundRef.current.play().catch(e => console.log('Sound play failed:', e));
          };

          const unlockSoundEffects = () => {
            if (soundEffectsUnlockedRef.current) return;

            const sounds = [cardReceivedSound.current, setCompletedSound.current].filter(Boolean);
            if (sounds.length === 0) return;

            soundEffectsUnlockedRef.current = true;
            sounds.forEach(sound => {
              const wasMuted = sound.muted;
              sound.muted = true;
              sound.volume = 1;

              sound.play()
                .then(() => {
                  sound.pause();
                  sound.currentTime = 0;
                  sound.muted = wasMuted;
                })
                .catch(() => {
                  sound.muted = wasMuted;
                  soundEffectsUnlockedRef.current = false;
                });
            });
          };

          const playIncomingAnimation = (card) => {
            if (!card) return Promise.resolve();

            setIncomingCard(card);
            setShowIncomingOverlay(true);

            return new Promise(resolve => {
              setTimeout(() => {
                setShowIncomingOverlay(false);
                setIncomingCard(null);
                resolve();
              }, INCOMING_ANIMATION_MS);
            });
          };

          // Preload all card images
          useEffect(() => {
            Object.values(CARD_IMAGES).forEach(imageUrl => {
              const img = new Image();
              img.src = imageUrl;
            });
            
            // Preload logo and back card images
            const logo = new Image();
            logo.src = 'https://i.ibb.co/rG16qpL8/Go-Phishlogo.png';
            
            const backCard = new Image();
            backCard.src = 'https://i.ibb.co/B5bRmGbw/backimage.png';
          }, []);

          // Preload sound effects immediately on mount
          useEffect(() => {
            // Create and preload whoosh sound
            const whoosh = new Audio('https://assets.mixkit.co/active_storage/sfx/1491/1491.wav');
            whoosh.preload = 'auto';
            whoosh.volume = 1;
            whoosh.load();
            cardReceivedSound.current = whoosh;

            // Create and preload sparkle sound
            const sparkle = new Audio('https://assets.mixkit.co/active_storage/sfx/866/866.wav');
            sparkle.preload = 'auto';
            sparkle.volume = 1;
            sparkle.load();
            setCompletedSound.current = sparkle;
          }, []);

          // Initialize room on mount
          useEffect(() => {
            const urlParams = new URLSearchParams(window.location.search);
            const joinCode = urlParams.get('join');
            
            const playerId = 'player_' + Math.random().toString(36).substr(2, 9);
            setMyPlayerId(playerId);
            
            if (joinCode) {
              setRoomCode(joinCode);
              setIsHost(false);
              checkRoomExists(joinCode);
            } else {
              const newRoomCode = generateRoomCode();
              setRoomCode(newRoomCode);
              setIsHost(true);
              createRoom(newRoomCode);
            }
          }, []);

          const generateRoomCode = () => {
            return Math.random().toString(36).substring(2, 8).toUpperCase();
          };

          const createRoom = (code) => {
            roomRef.current = database.ref(`rooms/${code}`);
            roomRef.current.set({
              host: '',
              guest: '',
              hostConnected: false,
              guestConnected: false,
              hostName: '',
              guestName: '',
              createdAt: Date.now()
            });
          };

          const checkRoomExists = async (code) => {
            const snapshot = await database.ref(`rooms/${code}`).once('value');
            if (!snapshot.exists()) {
              alert('Room does not exist. Please check the link.');
              window.location.href = window.location.origin + window.location.pathname;
            } else {
              roomRef.current = database.ref(`rooms/${code}`);
            }
          };

          const connectToRoom = () => {
            if (!playerName.trim()) {
              alert('Please enter your name');
              return;
            }

            if (isHost) {
              roomRef.current.update({
                host: myPlayerId,
                hostConnected: true,
                hostName: playerName
              });
              
              roomRef.current.child('guest').on('value', (snapshot) => {
                const guestId = snapshot.val();
                if (guestId) {
                  setConnected(true);
                }
              });
              
              roomRef.current.child('guestName').on('value', (snapshot) => {
                const name = snapshot.val();
                if (name) {
                  setOpponentName(name);
                }
              });
              
              roomRef.current.child('guestConnected').on('value', (snapshot) => {
                const isConnected = snapshot.val();
                if (isConnected === false && connected) {
                  setDisconnectMessage(`${opponentName || 'Your opponent'} has disconnected. The game has ended. You may close this window.`);
                  setGameEnded(true);
                }
              });
            } else {
              roomRef.current.update({
                guest: myPlayerId,
                guestConnected: true,
                guestName: playerName
              });
              
              roomRef.current.child('host').on('value', (snapshot) => {
                const hostId = snapshot.val();
                if (hostId) {
                  setConnected(true);
                }
              });
              
              roomRef.current.child('hostName').on('value', (snapshot) => {
                const name = snapshot.val();
                if (name) {
                  setOpponentName(name);
                }
              });
              
              roomRef.current.child('hostConnected').on('value', (snapshot) => {
                const isConnected = snapshot.val();
                if (isConnected === false && connected) {
                  setDisconnectMessage(`${opponentName || 'The host'} has disconnected. The game has ended. You may close this window.`);
                  setGameEnded(true);
                }
              });
            }

            presenceRef.current = database.ref('.info/connected');
            presenceRef.current.on('value', (snapshot) => {
              if (snapshot.val()) {
                const playerField = isHost ? 'hostConnected' : 'guestConnected';
                const playerPresence = roomRef.current.child(playerField);
                playerPresence.onDisconnect().set(false);
                playerPresence.set(true);
              }
            });

            gameDataRef.current = database.ref(`games/${roomCode}`);
            gameDataRef.current.on('value', handleGameDataChange);
          };

          // Auto-connect when room is ready and player has entered name
          useEffect(() => {
            if (roomRef.current && playerName.trim() && !connected && myPlayerId) {
              connectToRoom();
            }
          }, [playerName, roomRef.current, myPlayerId]);

          const handleGameDataChange = (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            const myRole = isHost ? 'host' : 'guest';
            const opponentRole = isHost ? 'guest' : 'host';

            if (data.gameState === 'playing' && gameState === 'setup') {
              setSettings(data.settings);
              setMyHand(data[`${myRole}Hand`] || []);
              setOpponentHandCount(data[`${opponentRole}HandCount`] || 0);
              setDeckCount(data.deckCount || 0);
              setIsMyTurn(data.currentTurn === myRole);
              setGameState('playing');
            }

            if (data.gameState === 'playing') {
              setMyHand(data[`${myRole}Hand`] || myHand);
              setOpponentHandCount(data[`${opponentRole}HandCount`] || 0);
              setDeckCount(data.deckCount || 0);
              setIsMyTurn(data.currentTurn === myRole);
              setMySets(data[`${myRole}Sets`] || []);
              setOpponentSets(data[`${opponentRole}Sets`] || []);
              setMyScore(data[`${myRole}Score`] || 0);
              setOpponentScore(data[`${opponentRole}Score`] || 0);

              const passedCard = data.lastPassedCard;
              if (
                passedCard &&
                passedCard.to === myRole &&
                passedCard.from !== myRole &&
                passedCard.id !== lastHandledPassedCardRef.current
              ) {
                lastHandledPassedCardRef.current = passedCard.id;
                playIncomingAnimation(passedCard.card);

                playSoundEffect(cardReceivedSound);
              }

              if (data.deck && isHost) {
                setDeck(data.deck);
              }
            }

            if (data.gameState === 'ended' && !gameEnded) {
              const myFinalScore = data[`${myRole}Score`] || 0;
              const opponentFinalScore = data[`${opponentRole}Score`] || 0;
              
              setMyScore(myFinalScore);
              setOpponentScore(opponentFinalScore);
              
              if (myFinalScore > opponentFinalScore) {
                setWinner('you');
              } else if (opponentFinalScore > myFinalScore) {
                setWinner('opponent');
              } else {
                setWinner('tie');
              }
              
              setGameEnded(true);
            }

            if (data.gameState === 'setup' && gameState === 'playing') {
              resetGame();
            }
          };

          const shuffleArray = (arr) => {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
          };

          const initializeDeck = () => {
            const cards = [];
            settings.selectedSets.forEach(sk => 
              CARD_SETS[sk].forEach(c => 
                cards.push({ id: `${sk}-${c}`, set: sk, name: c })
              )
            );
            return shuffleArray(cards);
          };

          const startGame = () => {
            if (!playerName.trim()) {
              alert('Please enter your name');
              return;
            }
            if (!connected) {
              alert('Waiting for opponent');
              return;
            }

            const newDeck = initializeDeck();
            const hostHand = newDeck.slice(0, 4);
            const guestHand = newDeck.slice(4, 8);
            const remaining = newDeck.slice(8);
            const hostGoesFirst = settings.firstPlayer === 'host';

            gameDataRef.current.set({
              gameState: 'playing',
              settings: settings,
              deck: remaining,
              deckCount: remaining.length,
              hostHand: hostHand,
              guestHand: guestHand,
              hostHandCount: 4,
              guestHandCount: 4,
              hostSets: [],
              guestSets: [],
              hostScore: 0,
              guestScore: 0,
              currentTurn: hostGoesFirst ? 'host' : 'guest',
              lastPassedCard: null
            });

            setDeck(remaining);
            setMyHand(hostHand);
            setOpponentHandCount(4);
            setDeckCount(remaining.length);
            setIsMyTurn(hostGoesFirst);
            setGameState('playing');
          };

          const drawCard = async () => {
            if (deckCount === 0) {
              if (settings.endTurnMode === 'always-draw') endTurn();
              return;
            }

            const snapshot = await gameDataRef.current.once('value');
            const data = snapshot.val();
            const currentDeck = data.deck || [];
            
            if (currentDeck.length === 0) {
              if (settings.endTurnMode === 'always-draw') endTurn();
              return;
            }

            const newDeck = [...currentDeck];
            const drawnCard = newDeck.pop();
            
            // Show incoming card animation
            await playIncomingAnimation(drawnCard);
            
            const myRole = isHost ? 'host' : 'guest';
            const newHand = [...myHand, drawnCard];

            await gameDataRef.current.update({
              deck: newDeck,
              deckCount: newDeck.length,
              [`${myRole}Hand`]: newHand,
              [`${myRole}HandCount`]: newHand.length
            });

            setMyHand(newHand);
            setDeck(newDeck);
            setDeckCount(newDeck.length);
            
            // Play whoosh sound when drawing a card
            playSoundEffect(cardReceivedSound);

            if (settings.endTurnMode === 'always-draw') {
              endTurn();
            }
          };

          const replenishHand = async (hand) => {
            if (deckCount === 0 || hand.length >= 4) return hand;

            const snapshot = await gameDataRef.current.once('value');
            const data = snapshot.val();
            const currentDeck = data.deck || [];
            
            const newDeck = [...currentDeck];
            const newHand = [...hand];
            
            while (newHand.length < 4 && newDeck.length > 0) {
              newHand.push(newDeck.pop());
            }

            const myRole = isHost ? 'host' : 'guest';
            await gameDataRef.current.update({
              deck: newDeck,
              deckCount: newDeck.length,
              [`${myRole}Hand`]: newHand,
              [`${myRole}HandCount`]: newHand.length
            });

            return newHand;
          };

          const giveCard = async () => {
            if (!selectedCard) return;

            // Start tossing animation
            setTossingCard(selectedCard);
            
            // Wait 2 seconds for animation to complete
            await new Promise(resolve => setTimeout(resolve, 2000));

            const snapshot = await gameDataRef.current.once('value');
            const data = snapshot.val();
            
            const myRole = isHost ? 'host' : 'guest';
            const opponentRole = isHost ? 'guest' : 'host';
            
            const newMyHand = myHand.filter(c => c.id !== selectedCard.id);
            const opponentHand = data[`${opponentRole}Hand`] || [];
            const newOpponentHand = [...opponentHand, selectedCard];

            const replenishedHand = await replenishHand(newMyHand);

            await gameDataRef.current.update({
              [`${myRole}Hand`]: replenishedHand,
              [`${myRole}HandCount`]: replenishedHand.length,
              [`${opponentRole}Hand`]: newOpponentHand,
              [`${opponentRole}HandCount`]: newOpponentHand.length,
              lastPassedCard: {
                id: `${myRole}-${opponentRole}-${selectedCard.id}-${Date.now()}`,
                from: myRole,
                to: opponentRole,
                card: selectedCard
              }
            });

            setMyHand(replenishedHand);
            setSelectedCard(null);
            setTossingCard(null);
          };

          const endTurn = async () => {
            const opponentRole = isHost ? 'guest' : 'host';
            await gameDataRef.current.update({
              currentTurn: opponentRole
            });
            setIsMyTurn(false);
            setSelectedCard(null);
          };

          const checkForSets = async (hand) => {
            for (let i = 0; i <= hand.length - 4; i++) {
              const fourCards = hand.slice(i, i + 4);
              const firstSet = fourCards[0].set;
              
              if (fourCards.every(card => card.set === firstSet)) {
                await completeSet(firstSet, hand);
                return true;
              }
            }
            return false;
          };

          const completeSet = async (setKey, hand) => {
            const setCards = hand.filter(c => c.set === setKey);
            
            // Show overlay with the 4 cards
            setCompletingSet({ setKey, cards: setCards });
            setShowSetOverlay(true);
            
            // Play celebration sound immediately
            playSoundEffect(setCompletedSound);

            setTimeout(() => {
              confetti({
                particleCount: 160,
                spread: 82,
                startVelocity: 42,
                origin: { x: 0.5, y: 0.42 },
                colors: ['#23879f', '#16b7a7', '#50d3df', '#fbbf24', '#bdf6e0']
              });
            }, 850);

            // Wait 2 seconds for animation to complete
            await new Promise(resolve => setTimeout(resolve, 2100));
            setShowSetOverlay(false);
            setCompletingSet(null);

            // Now update the game state
            const remainingCards = hand.filter(c => c.set !== setKey);
            const replenishedHand = await replenishHand(remainingCards);
            
            const myRole = isHost ? 'host' : 'guest';
            const snapshot = await gameDataRef.current.once('value');
            const data = snapshot.val();
            
            const currentSets = data[`${myRole}Sets`] || [];
            const newSets = [...currentSets, { set: setKey, cards: setCards }];
            const newScore = newSets.length;

            await gameDataRef.current.update({
              [`${myRole}Hand`]: replenishedHand,
              [`${myRole}HandCount`]: replenishedHand.length,
              [`${myRole}Sets`]: newSets,
              [`${myRole}Score`]: newScore
            });

            setMyHand(replenishedHand);
            setMySets(newSets);
            setMyScore(newScore);
          };

          useEffect(() => {
            if (myHand.length > 0 && gameState === 'playing') {
              checkForSets(myHand);
            }
          }, [myHand]);

          useEffect(() => {
            if (gameState === 'playing' && deckCount === 0 && myHand.length === 0 && opponentHandCount === 0 && !gameEnded) {
              gameDataRef.current.update({
                gameState: 'ended'
              });
            }
          }, [deckCount, myHand.length, opponentHandCount, gameState, gameEnded]);

          const completedCardIds = new Set(
            mySets.flatMap(set => (set.cards || []).map(card => card.id))
          );
          const visibleHandEntries = myHand
            .map((card, handIndex) => ({ card, handIndex }))
            .filter(({ card }) => !completedCardIds.has(card.id));
          const visibleMyHand = visibleHandEntries.map(({ card }) => card);

          useEffect(() => {
            if (gameState !== 'playing' || completedCardIds.size === 0) return;

            if (selectedCard && completedCardIds.has(selectedCard.id)) {
              setSelectedCard(null);
            }

            if (visibleMyHand.length === myHand.length || !gameDataRef.current) return;

            const myRole = isHost ? 'host' : 'guest';
            gameDataRef.current.update({
              [`${myRole}Hand`]: visibleMyHand,
              [`${myRole}HandCount`]: visibleMyHand.length
            });
            setMyHand(visibleMyHand);
          }, [gameState, myHand, mySets, selectedCard, isHost]);

          const handleDragStart = (e, card, index) => {
            setDraggedCard({ card, index });
          };

          const handleDragOver = (e, index) => {
            e.preventDefault();
            setDragOverIndex(index);
          };

          const handleDrop = async (e, dropIndex) => {
            e.preventDefault();
            if (draggedCard === null) return;

            const newHand = [...myHand];
            const [removed] = newHand.splice(draggedCard.index, 1);
            newHand.splice(dropIndex, 0, removed);
            
            setMyHand(newHand);
            setDraggedCard(null);
            setDragOverIndex(null);

            const myRole = isHost ? 'host' : 'guest';
            await gameDataRef.current.update({
              [`${myRole}Hand`]: newHand
            });
          };

          const copyInviteLink = () => {
            navigator.clipboard.writeText(`${window.location.origin}${window.location.pathname}?join=${roomCode}`);
            setCopied(true);
            setTimeout(() => setCopied(false), 2000);
          };

          const resetGame = () => {
            lastHandledPassedCardRef.current = null;
            setGameState('setup');
            setGameEnded(false);
            setWinner(null);
            setMyHand([]);
            setOpponentHandCount(0);
            setMySets([]);
            setOpponentSets([]);
            setMyScore(0);
            setOpponentScore(0);
            setDeck([]);
            setDeckCount(0);
          };

          const handleScrollIndicators = () => {
            if (!allCardsContainerRef.current) return;
            
            const container = allCardsContainerRef.current;
            const scrollTop = container.scrollTop;
            const scrollHeight = container.scrollHeight;
            const clientHeight = container.clientHeight;
            
            // Show top indicator if scrolled down more than 50px
            setShowScrollTop(scrollTop > 50);
            
            // Show bottom indicator if not at bottom (more than 50px from bottom)
            setShowScrollBottom(scrollTop < scrollHeight - clientHeight - 50);
          };

          // Check scroll indicators when modal opens or hand changes
          useEffect(() => {
            if (showAllCards && allCardsContainerRef.current) {
              handleScrollIndicators();
            }
          }, [showAllCards, visibleMyHand.length]);

          const returnToSetup = async () => {
            await gameDataRef.current.update({
              gameState: 'setup'
            });
            resetGame();
          };

          // Cleanup on unmount and window close
          useEffect(() => {
            const handleBeforeUnload = () => {
              if (roomRef.current) {
                const playerField = isHost ? 'hostConnected' : 'guestConnected';
                roomRef.current.update({ [playerField]: false });
                
                if (isHost && gameDataRef.current) {
                  gameDataRef.current.remove();
                  roomRef.current.remove();
                }
              }
            };

            window.addEventListener('beforeunload', handleBeforeUnload);

            return () => {
              window.removeEventListener('beforeunload', handleBeforeUnload);
              
              if (roomRef.current) {
                const playerField = isHost ? 'hostConnected' : 'guestConnected';
                roomRef.current.update({ [playerField]: false });
                
                if (isHost && gameDataRef.current) {
                  gameDataRef.current.remove();
                  roomRef.current.remove();
                }
              }
              if (gameDataRef.current) {
                gameDataRef.current.off();
              }
              if (presenceRef.current) {
                presenceRef.current.off();
              }
            };
          }, [isHost]);

          if (gameState === 'setup') {
            return (
              <div
                className="w-full min-h-screen p-4 flex items-center justify-center"
                style={{background: 'linear-gradient(to bottom, #dafbe9, #c4f7e5)'}}
                onPointerDown={unlockSoundEffects}
                onKeyDown={unlockSoundEffects}
              >
                <div className="bg-white rounded-lg p-4 max-w-5xl w-full" style={{margin: 'clamp(8px, 2vh, 20px)', borderTop: '4px solid #23879f'}}>
                  <div className="text-center mb-4">
                    <img src="https://i.ibb.co/C3KcP9cZ/Adaptivelogotrans.png" alt="Adaptive Logo" className="mx-auto mb-2" style={{width: '125px'}} />
                    <h1 className="text-3xl font-bold" style={{color: '#004870'}}>Go-Fish Phonics</h1>
                  </div>
                  <div className="space-y-3">
                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">Your Name</label>
                        <input 
                          type="text" 
                          value={playerName} 
                          onChange={(e) => setPlayerName(e.target.value)} 
                          className="w-full px-4 py-2 border border-gray-300 rounded-lg" 
                          placeholder="Enter your name" 
                        />
                      </div>
                      {isHost && (
                        <div>
                          <label className="block text-sm font-medium text-gray-700 mb-1">Turn End Mode</label>
                          <select 
                            value={settings.endTurnMode} 
                            onChange={(e) => setSettings({...settings, endTurnMode: e.target.value})} 
                            className="w-full px-4 py-2 border border-gray-300 rounded-lg"
                          >
                            <option value="always-draw">Classic Mode</option>
                            <option value="manual-end">Strategic Mode</option>
                          </select>
                        </div>
                      )}
                    </div>
                    {isHost && (
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">Who Goes First?</label>
                        <select 
                          value={settings.firstPlayer} 
                          onChange={(e) => setSettings({...settings, firstPlayer: e.target.value})} 
                          className="w-full px-4 py-2 border border-gray-300 rounded-lg"
                        >
                          <option value="host">Host (You)</option>
                          <option value="opponent">Opponent</option>
                        </select>
                      </div>
                    )}
                    {isHost && (
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">
                          <Settings size={18} /> Select Card Sets
                        </label>
                        <div className="bg-gray-50 p-3 rounded-lg">
                          <div className="grid grid-cols-4 gap-2 text-sm">
                            {Object.entries(SET_NAMES).map(([key, name]) => (
                              <div key={key} className="flex items-center">
                                <input 
                                  type="checkbox" 
                                  checked={settings.selectedSets.includes(key)} 
                                  onChange={(e) => {
                                    if (e.target.checked) {
                                      setSettings({...settings, selectedSets: [...settings.selectedSets, key]});
                                    } else {
                                      setSettings({...settings, selectedSets: settings.selectedSets.filter(s => s !== key)});
                                    }
                                  }} 
                                  className="mr-2" 
                                />
                                {name}
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>
                    )}
                    {isHost && (
                      <div className="bg-blue-50 border-2 border-blue-300 rounded-lg p-3">
                        <div className="flex items-center justify-between mb-2">
                          <div className="flex items-center gap-2">
                            <Users size={20} />
                            <span className="font-semibold text-blue-900">Invite Opponent</span>
                          </div>
                          <div className="flex items-center gap-3">
                            <div className="px-3 py-1 bg-white border border-gray-300 rounded text-sm">
                              {connected && opponentName ? opponentName : 'No connection'}
                            </div>
                            {connected ? (
                              <span className="text-green-600 text-sm flex items-center gap-1">
                                <Wifi size={16} /> Connected
                              </span>
                            ) : (
                              <span className="text-orange-600 text-sm flex items-center gap-1">
                                <WifiOff size={16} /> Waiting...
                              </span>
                            )}
                          </div>
                        </div>
                        <p className="text-sm text-gray-700 mb-3">Share this link:</p>
                        <div className="flex gap-2">
                          <input 
                            type="text" 
                            value={`${window.location.origin}${window.location.pathname}?join=${roomCode}`} 
                            readOnly 
                            className="flex-1 px-3 py-2 bg-white border border-gray-300 rounded text-sm" 
                          />
                          <button 
                            onClick={copyInviteLink}
                            className="px-4 py-2 text-white rounded hover:opacity-90 flex items-center gap-2" 
                            style={{backgroundColor: '#50d3df'}}
                          >
                            {copied ? <Check size={16} /> : <Copy size={16} />}
                            {copied ? 'Copied!' : 'Copy'}
                          </button>
                        </div>
                      </div>
                    )}
                    {!isHost && (
                      <div className="bg-green-50 border-2 border-green-300 rounded-lg p-3">
                        <p className="text-green-900 font-semibold mb-2">Joining game...</p>
                        <p className="text-sm text-gray-700 mb-2">Enter your name above to connect</p>
                        {connected && (
                          <p className="text-green-600 text-sm mt-2 flex items-center gap-1">
                            <Wifi size={16} /> Connected! Waiting for host to start game...
                          </p>
                        )}
                      </div>
                    )}
                    {isHost ? (
                      <button 
                        onClick={startGame} 
                        disabled={!connected}
                        className={`w-full py-2 rounded-lg font-semibold ${connected ? 'text-white hover:opacity-90' : 'bg-gray-300 text-gray-500 cursor-not-allowed'}`} 
                        style={connected ? {backgroundColor: '#23879f'} : {}}
                      >
                        {connected ? 'Start Game' : 'Waiting for Opponent...'}
                      </button>
                    ) : (
                      <div className="w-full py-2 text-center text-gray-600 font-semibold">
                        {connected ? 'Connected - Waiting for host to start game...' : 'Enter your name to connect'}
                      </div>
                    )}
                  </div>
                </div>
              </div>
            );
          }

          return (
            <div
              className="w-full min-h-screen gf-game-table flex flex-col"
              onPointerDown={unlockSoundEffects}
              onKeyDown={unlockSoundEffects}
            >
              {/* Tossing card animation */}
              {tossingCard && (
                <div
                  className="absolute z-50 pointer-events-none gf-pass-card-flight"
                  style={{
                    left: '8rem',
                    bottom: 'calc(4rem + 56px)',
                    perspective: '1000px',
                    transformStyle: 'preserve-3d'
                  }}
                >
                  <div className="gf-pass-card-trail" />
                  <div className="rounded-lg shadow-2xl gf-pass-card-image">
                    <img
                      src={CARD_IMAGES[tossingCard.id]}
                      alt={tossingCard.name}
                      className="gf-pass-card-face gf-pass-card-front"
                    />
                    <img
                      src="https://i.ibb.co/B5bRmGbw/backimage.png"
                      alt="Card back"
                      className="gf-pass-card-face gf-pass-card-back"
                    />
                  </div>
                </div>
              )}
              
              {showSetOverlay && completingSet && (
                <div className="absolute inset-0 bg-black bg-opacity-70 flex items-center justify-center gf-set-complete-overlay" style={{zIndex: 100}}>
                  <div className="relative gf-set-complete-stage">
                    <div className="gf-set-complete-burst" />
                    <div className="gf-set-complete-title">Set complete</div>
                    <div className="flex gap-4 p-8 bg-white rounded-xl gf-set-complete-card-row">
                      {completingSet.cards.map((card, i) => (
                        <div
                          key={card.id}
                          className="w-44 h-60 rounded-lg shadow-2xl relative gf-set-complete-card"
                          style={{'--card-index': i}}
                        >
                          <img
                            src={CARD_IMAGES[card.id]}
                            alt={card.name}
                            className="w-full h-full object-cover rounded-lg"
                          />
                        </div>
                      ))}
                    </div>
                    <div className="absolute inset-0 rounded-xl pointer-events-none gf-set-complete-frame" />
                  </div>
                </div>
              )}
              
              {showIncomingOverlay && incomingCard && (
                <div className="absolute inset-0 bg-black bg-opacity-70 flex items-center justify-center gf-incoming-overlay" style={{zIndex: 100}}>
                  <div className="relative flex flex-col items-center gf-incoming-stage">
                    <div className="gf-incoming-trail" />
                    <h2 className="text-4xl font-bold italic mb-4 text-white gf-incoming-title">Incoming!</h2>
                    <div className="p-8 bg-white rounded-xl gf-incoming-card-wrap">
                      <div className="w-44 h-60 rounded-lg shadow-2xl relative gf-incoming-card">
                        <img
                          src={CARD_IMAGES[incomingCard.id]}
                          alt={incomingCard.name}
                          className="w-full h-full object-cover rounded-lg"
                        />
                      </div>
                    </div>
                    <div className="absolute inset-0 rounded-xl pointer-events-none gf-incoming-frame" />
                  </div>
                </div>
              )}
              
              <style dangerouslySetInnerHTML={{__html: `
                @keyframes expandCards {
                  0% {
                    transform: scale(1);
                  }
                  100% {
                    transform: scale(1.2);
                  }
                }
                .gf-set-complete-overlay {
                  animation: setOverlayFade 2.1s ease-out forwards;
                }
                .gf-set-complete-stage {
                  animation: setStageCollect 2.1s cubic-bezier(.2, .8, .2, 1) forwards;
                  transform-origin: center center;
                  will-change: transform, opacity, filter;
                }
                .gf-set-complete-title {
                  position: absolute;
                  left: 50%;
                  top: -76px;
                  transform: translateX(-50%);
                  color: #fff;
                  font-size: 2.4rem;
                  font-weight: 800;
                  font-style: italic;
                  letter-spacing: 0;
                  text-shadow: 0 3px 18px rgba(0, 0, 0, .34), 0 0 18px rgba(251, 191, 36, .72);
                  opacity: 0;
                  animation: setTitlePop 2.1s ease-out forwards;
                  white-space: nowrap;
                }
                .gf-set-complete-card-row {
                  position: relative;
                  overflow: visible;
                  animation: setRowGlow 2.1s ease-out forwards;
                }
                .gf-set-complete-card {
                  animation: setCardGather 2.1s cubic-bezier(.16, .84, .22, 1) forwards;
                  animation-delay: calc(var(--card-index) * 45ms);
                  transform-origin: center center;
                  will-change: transform, opacity, filter;
                }
                .gf-set-complete-card img {
                  animation: setCardShimmer 2.1s ease-out forwards;
                }
                .gf-set-complete-frame {
                  border: 4px solid rgba(22, 183, 167, 0);
                  box-shadow: 0 0 0 rgba(22, 183, 167, 0);
                  animation: setFrameLock 2.1s ease-out forwards;
                }
                .gf-set-complete-burst {
                  position: absolute;
                  inset: -24px;
                  border-radius: 22px;
                  pointer-events: none;
                  opacity: 0;
                  background:
                    radial-gradient(circle at 50% 50%, rgba(251, 191, 36, .54), transparent 36%),
                    radial-gradient(circle at 24% 34%, rgba(80, 211, 223, .42), transparent 26%),
                    radial-gradient(circle at 76% 66%, rgba(22, 183, 167, .38), transparent 28%);
                  filter: blur(10px);
                  animation: setBurst 2.1s ease-out forwards;
                }
                @keyframes setOverlayFade {

                  <div className="text-sm font-semibold text-gray-600 mb-1">{playerName || 'Your'}'s Hand</div>
                  <div className="text-lg font-bold">{isMyTurn ? "Your Turn" : `${opponentName || "Opponent"}'s Turn`}</div>
                </div>
              </div>
              <div className="absolute top-3 right-3 bg-white shadow-lg rounded-lg p-2 z-20 border-2 border-gray-300 gf-score-panel">
                <div className="flex gap-6">
                  <div className="text-center">
                    <div className="text-xs text-gray-600 mb-1">{playerName}</div>
                    <div className="text-2xl font-bold text-blue-600">{myScore}</div>
                  </div>
                  <div className="text-center">
                    <div className="text-xs text-gray-600 mb-1">{opponentName}</div>
                    <div className="text-2xl font-bold text-red-600">{opponentScore}</div>
                  </div>
                </div>
              </div>
              <div className="flex-1 p-2 flex items-start justify-center">
                <div className="relative flex justify-center items-center" style={{width: '360px', height: '116px'}}>
                  {Array(opponentHandCount).fill(0).map((_, i) => {
                    const totalCards = opponentHandCount;
                    const maxRotation = 18; // degrees
                    const cardSpacing = 26; // pixels
                    const arcHeight = 12; // pixels
                    
                    // Calculate rotation for arc effect
                    const rotation = ((i / (totalCards - 1 || 1)) - 0.5) * 2 * maxRotation;
                    
                    // Calculate horizontal position
                    const xOffset = (i - (totalCards - 1) / 2) * cardSpacing;
                    
                    // Calculate vertical position for downward arc
                    const normalizedPos = (i / (totalCards - 1 || 1)) - 0.5; // -0.5 to 0.5
                    const yOffset = arcHeight * (1 - 4 * normalizedPos * normalizedPos); // parabola
                    
                    return (
                      <div 
                        key={i} 
                        className="absolute w-16 h-24 rounded-lg shadow-lg gf-opponent-card"
                        style={{
                          transform: `translateX(${xOffset}px) translateY(${yOffset}px) rotate(${rotation}deg)`,
                          zIndex: i,
                          border: '0.3px solid rgba(0, 0, 0, 0.3)'
                        }}
                      >
                        <img 
                          src="https://i.ibb.co/B5bRmGbw/backimage.png" 
                          alt="Card back"
                          className="w-full h-full object-cover rounded-lg"
                        />
                      </div>
                    );
                  })}
                </div>
              </div>
              <div className="flex justify-center items-center py-2">
                <div className="text-center">
                  <button 
                    onClick={drawCard} 
                    disabled={!isMyTurn || deckCount === 0}
                    className={`gf-draw-button ${!isMyTurn || deckCount === 0 ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer'}`}
                    style={{outline: 'none'}}
                  >
                    <img 
                      src="https://i.ibb.co/rG16qpL8/Go-Phishlogo.png"
                      alt="Draw Card"
                      className="w-40 h-auto gf-draw-pile"
                      style={{display: 'block'}}
                    />
                  </button>
                  <div className="text-sm mt-2 font-semibold">
                    {isHost && deckCount > 0 ? `${deckCount} cards remaining` : 'Draw Pile'}
                  </div>
                </div>
                {settings.endTurnMode === 'manual-end' && (
                  <button 
                    onClick={endTurn} 
                    disabled={!isMyTurn} 
                    className={`ml-8 px-6 py-3 rounded-lg font-semibold ${isMyTurn ? 'text-white hover:opacity-90' : 'bg-gray-300 text-gray-500 cursor-not-allowed'}`} 
                    style={isMyTurn ? {backgroundColor: '#50d3df'} : {}}
                  >
                    End Turn
                  </button>
                )}
              </div>
              <div className="flex-1 p-2 flex items-end justify-center relative">
                {selectedCard && visibleMyHand.some(card => card.id === selectedCard.id) && (
                  <div className="absolute left-8 gf-selected-preview" style={{bottom: 'calc(3.5rem + 42px)', zIndex: showAllCards ? 60 : 10}}>
                    <div className="relative">
                      <img 
                        src={CARD_IMAGES[selectedCard.id]} 
                        alt={selectedCard.name} 
                        className="rounded-lg shadow-2xl border-4 border-yellow-400 gf-play-card"
                        style={{width: '280px', height: '360px'}}
                      />
                      <button 
                        onClick={(e) => { e.stopPropagation(); giveCard(); }} 
                        className="absolute -bottom-12 left-0 right-0 bg-red-500 text-white rounded-lg px-5 py-3 hover:bg-red-600 shadow-xl flex items-center justify-between text-lg font-bold gf-action-button"
                        style={{width: '280px'}}
                      >
                        <ArrowUp />
                        <span>Pass Card</span>
                        <ArrowUp />
                      </button>
                    </div>
                  </div>
                )}
                <div className="flex flex-col items-center gap-2 max-w-4xl">
                  <div className="flex gap-2">
                    <button 
                      onClick={() => setShowAllCards(!showAllCards)}
                      className="px-4 py-2 bg-blue-500 text-white rounded-lg text-sm font-semibold hover:bg-blue-600 shadow"
                    >
                      {showAllCards ? 'Close Hand View' : 'View All Cards'}
                    </button>
                    <button 
                      onClick={() => setShowSets(!showSets)}
                      className="px-4 py-2 bg-green-500 text-white rounded-lg text-sm font-semibold hover:bg-green-600 shadow"
                    >
                      View Sets ({myScore + opponentScore})
                    </button>
                  </div>
                  <div className="overflow-x-auto flex gap-2 px-3 max-w-full" style={{maxWidth: '720px'}}>
                    {visibleHandEntries.map(({ card, handIndex }, i) => (
                      <div
                        key={card.id}
                        draggable
                        onDragStart={(e) => handleDragStart(e, card, handIndex)}
                        onDragOver={(e) => handleDragOver(e, i)}
                        onDrop={(e) => handleDrop(e, handIndex)}
                        onClick={() => setSelectedCard(selectedCard?.id === card.id ? null : card)}
                        className={`w-36 h-52 rounded-lg shadow-lg cursor-pointer relative flex-shrink-0 gf-play-card gf-hand-card ${selectedCard?.id === card.id ? 'border-4 border-yellow-400' : 'border-0'} ${dragOverIndex === i ? 'ring-4 ring-blue-400' : ''}`}
                      >
                        <img src={CARD_IMAGES[card.id]} alt={card.name} className="w-full h-full object-cover rounded-lg" />
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          );
        };

        ReactDOM.render(<GoFishPhonics />, document.getElementById('root'));
    </script>
</body>
</html>
